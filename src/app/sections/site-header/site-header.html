<header class="site-header">
  <div class="container header-inner">
    <a class="brand" href="#top" (click)="closeMenu()">Max Tahmasebi</a>

    <button
      type="button"
      class="menu-button"
      [attr.aria-expanded]="menuOpen()"
      aria-controls="primary-nav"
      (click)="toggleMenu()"
    >
      <span aria-hidden="true">{{ menuOpen() ? '✕' : '☰' }}</span>
      <span class="visually-hidden">{{ menuOpen() ? 'Close menu' : 'Open menu' }}</span>
    </button>

    <nav id="primary-nav" class="nav" [class.nav-open]="menuOpen()" aria-label="Main">
      <ul>
        @for (item of navItems; track item.id) {
          <li>
            <a
              [href]="item.href"
              [attr.aria-current]="activeSection() === item.id ? 'true' : null"
              (click)="closeMenu()"
              >{{ item.label }}</a
            >
          </li>
        }
      </ul>
    </nav>

    <button
      type="button"
      class="theme-toggle"
      (click)="themeService.toggle()"
      [attr.aria-pressed]="themeService.theme() === 'light'"
    >
      <span aria-hidden="true">{{ themeService.theme() === 'dark' ? '☀️' : '🌙' }}</span>
      <span class="visually-hidden">Switch to
        {{ themeService.theme() === 'dark' ? 'light' : 'dark' }} theme</span>
    </button>
  </div>
</header>
