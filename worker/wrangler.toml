# max-ta-api Worker. Deployed by CI with:
#   npx wrangler deploy --config worker/wrangler.toml
#
# The max-ta.com/api/* route is managed by Terraform (infra/main.tf), not
# here, so route ownership lives in exactly one place.

name = "max-ta-api"
main = "src/index.ts"
compatibility_date = "2026-07-01"
workers_dev = false

[[kv_namespaces]]
binding = "VISITS"
# Paste the value of `terraform output kv_namespace_id` after the first apply.
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[observability]
enabled = true
